---
name: Update Flake
on:
  # Run every Friday at midnight UTC
  schedule:
    - cron: 0 0 * * 5

  # Allow manual trigger
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Update flake
        id: update
        run: |
          # Update the flake
          nix flake update

          # Check if there are changes
          if git diff --quiet flake.lock; then
            echo "No updates available"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Updates found"
            echo "has_updates=true" >> $GITHUB_OUTPUT

            # Get the date for branch name
            DATE=$(date +%Y-%m-%d)
            echo "date=$DATE" >> $GITHUB_OUTPUT
          fi
      - name: Create Pull Request
        if: steps.update.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=${{ steps.update.outputs.date }}
          BRANCH="automated-flake-update-$DATE"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and push branch
          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "chore: update flake.lock ($DATE)"
          git push origin "$BRANCH"

          # Create PR with auto-merge enabled
          gh pr create \
            --title "chore: update flake inputs ($DATE)" \
            --body "Automated weekly flake update.
          This PR updates all flake inputs to their latest versions.
          - If CI passes, this PR will be automatically merged.
          - If CI fails, manual review is required.
          Changes:
          \`\`\`
          $(git diff origin/master flake.lock | head -50)
          \`\`\`" \
            --base master \
            --head "$BRANCH"

          # Enable auto-merge (will merge when all checks pass)
          gh pr merge "$BRANCH" --auto --squash
      - name: Summary
        if: steps.update.outputs.has_updates == 'true'
        run: |-
          echo "✅ Created PR for flake updates" >> $GITHUB_STEP_SUMMARY
          echo "The PR will automatically merge if CI passes" >> $GITHUB_STEP_SUMMARY
